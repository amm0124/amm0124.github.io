# SEO 설정
locale: "ko_KR"
timezone: "Asia/Seoul"
lang: "ko"

# 퍼머링크 설정
permalink: /:year/:month/:day/:title/
paginate: 10

exclude: ['README.md', 'Gemfile.lock', 'Gemfile', 'Rakefile', 'node_modules', 'vendor']

# GitHub 정보
github_username: amm0124

# 작성자 정보 (SEO용으로 개선)
