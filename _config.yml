# 퍼머링크 설정
permalink: /:year/:month/:day/:title/
paginate: 10

exclude: ['README.md', 'Gemfile.lock', 'Gemfile', 'Rakefile', 'node_modules', 'vendor']


# markdown and code block 
markdown: kramdown
highlighter: rouge

kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-loading-lazy


# Feed 설정
feed:
  excerpt_only: true

# 사이트맵 설정 (수정됨)
sitemap:
  exclude:
    - /feed.xml
    - /rss.xml
    - /assets/
    - "*.css"
    - "*.js"
    - /404.html