# SEO 메타 정보. description + motto가 헤더에 뜸
title: "Stay hungry, stay foolish - Internet Home"
description: "개발자 건호김의 기술 블로그입니다. 프로그래밍, 알고리즘, 웹 개발에 대한 지식과 경험을 공유합니다. Stay hungry, stay foolish."
meta_description: "개발자 건호김의 기술 블로그 - 프로그래밍, 알고리즘, 웹 개발 지식 공유"
motto: "Stay hungry, stay foolish"
banner: "In the one and only true way. The object-oriented version of 'Spaghetti code' is, of course, 'Lasagna code'. (Too many layers).<br> - (E.W. Dijkstra)" # 배너 (적용됨)
