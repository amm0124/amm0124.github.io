# Build settings
markdown: kramdown
highlighter: rouge

# Kramdown 설정
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'
    span:
      line_numbers: false
    block:
      line_numbers: false

# 플러그인
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-loading-lazy

# SEO 플러그인 추가 설정
seo:
  type: Person

# Feed 설정
feed:
  excerpt_only: true

# 사이트맵 설정
sitemap:
  exclude:
    - /feed.xml
    - /rss.xml
    - /sitemap.xml
    - /assets/
    - "*.css"
    - "*.js"
    - /404.html


# 기본 이미지 (OG 이미지용)
logo: "/assets/images/logo.png"  # 로고 이미지 경로 (있다면)
image: "/assets/images/og-image.png"  # Open Graph 기본 이미지 (있다면)

# 웹마스터 도구 인증 (필요시 추가)
# naver_site_verification: ""
# bing_site_verification: ""

# 기타 SEO 관련 설정
future: false
show_excerpts: true
excerpt_separator: "<!--more-->"




