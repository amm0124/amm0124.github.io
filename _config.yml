  name: "건호 김"
  email: "amm012450@gmail.com"
  url: "https://amm0124.github.io"
  bio: "컴퓨터 과학을 공부하는 개발자입니다. 알고리즘과 웹 개발에 관심이 많습니다."
  location: "South Korea"

# 소셜 미디어 정보
social:
  name: "건호 김"
  links:
    - https://github.com/amm0124
